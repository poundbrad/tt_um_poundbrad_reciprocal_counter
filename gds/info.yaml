# Tiny Tapeout project information
project:
  title:        "Two-Channel Reciprocal Counter"
  author:       "Brad Pound"
  discord:      ""
  description:  "Two-channel reciprocal frequency counter with an SPI register interface"
  language:     "Verilog"
  clock_hz:     7200000

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x2"

  # Your top module name must start with "tt_um_".
  top_module: "tt_um_poundbrad_reciprocal_counter"

  # Source files must be in ./src.
  source_files:
    - "tt_um_poundbrad_reciprocal_counter.v"
    - "reciprocal_counter.v"
    - "reciprocal_channel.v"
    - "register_file.v"
    - "spi_register_interface.v"

# The pinout of your project. Leave unused pins blank.
pinout:
  # Inputs
  ui[0]: "CH0_SIGNAL"
  ui[1]: "CH1_SIGNAL"
  ui[2]: "SPI_SCLK"
  ui[3]: "SPI_MOSI"
  ui[4]: "SPI_CS_N"
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "SPI_MISO"
  uo[1]: ""
  uo[2]: ""
  uo[3]: ""
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
